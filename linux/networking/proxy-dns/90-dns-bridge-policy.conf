# Purpose: Configures systemd-resolved as a pure stub/bridge.
# Scope: Global systemd-resolved daemon behavior.
# Dependencies: dnscrypt-proxy listening on 127.0.0.1:53.
# Standard: resolved.conf(5) §[Resolve].
#
# Chain: apps -> 127.0.0.53 stub -> resolved -> 127.0.0.1:53 (dnscrypt-proxy).
# Encryption, provider load-balancing, and upstream DNSSEC enforcement
# are fully delegated to dnscrypt-proxy.
[Resolve]

# Sole upstream: dnscrypt-proxy's loopback listener.
# IPv4-loopback transport is deliberate; upstream AAAA records and IPv6
# endpoints are governed entirely by dnscrypt-proxy's resolver selection.
# This address does not collide with local DNS proxies spun up by commercial VPN clients or native WireGuard configurations.
DNS=127.0.0.1

# Suppress the compiled-in fallback list to ensure fail-closed behavior.
# If dnscrypt-proxy is down, no silent plaintext escape occurs.
FallbackDNS=

# Global catch-all routing domain.
# Ensures every query, from every link, goes to the local DNS proxy.
Domains=~.

# The hop to 127.0.0.1 is plaintext by design (kernel-local).
DNSOverTLS=no

# Local DNSSEC validation is disabled; cryptographic signature validation is fully 
# delegated to the upstream DoH resolvers (via dnscrypt-proxy) to prevent 
# boot-time failures when the hardware clock is incorrect.
DNSSEC=no

# Disable local multicast name resolution to reduce attack surface.
# RFC 4795
LLMNR=no
# RFC 6762
MulticastDNS=no

# Maintain the stub listener for applications and VPN connectivity checks.
DNSStubListener=yes
