# Purpose: Transport tuning for low-latency TCP (BBR) and UDP/QUIC workloads.
# Scope: Global kernel networking stack (~500 Mbps profile).
# Dependencies: CONFIG_TCP_CONG_BBR (module in Fedora kernels; auto-loaded
#               when selected below).
# Standard: ip-sysctl.rst, tcp(7), tc-fq(8), udp(7).

# Default egress qdisc. BBR no longer requires fq (the kernel falls back to
# internal TCP-layer pacing since 4.13), but fq remains the recommended
# pairing: efficient qdisc-level pacing plus per-flow isolation.
# Fedora default: fq_codel
net.core.default_qdisc = fq

# TCP congestion control algorithm.
# Fedora default: cubic
net.ipv4.tcp_congestion_control = bbr

# Enable TCP MTU probing to prevent path-MTU blackholes.
# Fedora default: 0
net.ipv4.tcp_mtu_probing = 1

# Limit unsent bytes in the socket write queue to reduce bufferbloat.
# Strongly recommended alongside BBR for HTTP/2 multiplexing.
# Alt values: 16384 (16 KiB) latency-optimal standard; 262144 (256 KiB)
# high-bitrate middle ground; 8388608 (8 MiB) heavy send-side buffering.
# Fedora default: 4294967295 (i.e., unlimited)
net.ipv4.tcp_notsent_lowat = 16384

# UDP socket buffer ceilings for QUIC (DoH3 + MASQUE).
# Unified ceiling to accommodate userspace QUIC congestion control.
# Fedora default: 212992
net.core.rmem_max = 16777216
# Fedora default: 212992
net.core.wmem_max = 16777216

# TCP window autotuning max (sized for ~500 Mbps sustained at high RTT;
# 16 MiB covers the bandwidth-delay product of intercontinental paths).
# Only the maximum limits are raised; default allocations are unchanged.
# Fedora default: 4096 131072 6291456
net.ipv4.tcp_rmem = 4096 131072 16777216
# Fedora default: 4096 16384 4194304
net.ipv4.tcp_wmem = 4096 16384 16777216
