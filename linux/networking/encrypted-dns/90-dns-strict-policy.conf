# Purpose: Configures systemd-resolved for strict, multi-provider DNS-over-TLS.
# Scope: Global systemd-resolved daemon behavior.
# Dependencies: External DoT providers reachable on port 853.
# Standard: resolved.conf(5) §[Resolve].
#
# Chain: apps -> 127.0.0.53 stub -> resolved -> External DoT Providers.
# Strict TLS transport is enforced system-wide. DNSSEC validation and 
# provider resilience are delegated to the upstream DoT resolvers.
[Resolve]

# Upstream resolvers configured as addr#SNI tuples.
# An SNI name is REQUIRED for DoT certificate verification (RFC 8310).
# Multiple independent providers are listed across both IPv4 and IPv6 to 
# ensure resilience (IPv6 is used when reachable).
DNS=1.1.1.1#one.one.one.one 1.0.0.1#one.one.one.one 9.9.9.10#dns10.quad9.net 149.112.112.10#dns10.quad9.net 8.8.8.8#dns.google 8.8.4.4#dns.google 2606:4700:4700::1111#one.one.one.one 2606:4700:4700::1001#one.one.one.one 2620:fe::10#dns10.quad9.net 2620:fe::fe:10#dns10.quad9.net 2001:4860:4860::8888#dns.google 2001:4860:4860::8844#dns.google

# Suppress the compiled-in fallback list to ensure fail-closed behavior.
# Eliminates any plaintext escape hatch if all DoT servers are unreachable.
FallbackDNS=

# Global catch-all routing domain.
# Ensures every query, from every link, is forced to the DoT servers above.
Domains=~.

# Strict mode enforcement.
# Requires DoT and will fail closed if a TLS session cannot be established.
# Prevents any silent downgrade to plaintext on port 53.
DNSOverTLS=yes

# Local DNSSEC validation is disabled to prevent cold-boot time deadlocks.
# DNSSEC requires accurate time for signature validity windows; disabling it
# locally avoids failures when the hardware clock is incorrect. Transport
# authentication is handled by DoT, and validation is delegated upstream.
DNSSEC=no

# Disable local multicast name resolution to reduce attack surface.
# Trade-off: .local and LAN service discovery will not resolve.
# RFC 4795
LLMNR=no
# RFC 6762
MulticastDNS=no

# Maintain the stub listener for applications and VPN connectivity checks.
DNSStubListener=yes
