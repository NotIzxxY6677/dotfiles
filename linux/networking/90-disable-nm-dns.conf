# Purpose: Removes NetworkManager from the DNS path entirely.
# Scope: Global NetworkManager daemon behavior.
# Dependencies: None — resolver-agnostic; works with any locally managed
#               resolver stack.
# Standard: NetworkManager.conf(5) §[main].
#
# Whatever resolver is deployed locally remains the single DNS authority.
# Together, the two settings below ensure link-supplied resolver data
# (DHCPv4 opt. 6 / DHCPv6 opt. 23, RFC 3646; RA RDNSS, RFC 8106) is learned
# by NM but never applied anywhere, and /etc/resolv.conf is left entirely
# under the administrator's control (point it at the local resolver yourself,
# e.g. via a static file or symlink — NM will no longer manage it).
[main]

# Do not write /etc/resolv.conf and disable NM's internal DNS processing.
dns=none

# Do not push per-link DNS into systemd-resolved over D-Bus — the remaining
# out-of-band injection path when resolved is in use. VPN clients that talk
# to resolved's D-Bus API themselves, and wg-quick via resolvconf/resolvectl,
# are unaffected by this setting.
systemd-resolved=false
