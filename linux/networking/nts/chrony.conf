# Purpose: Privacy-hardened, authenticated time synchronization (NTS-only, non-smearing).
# Scope: Global chronyd configuration.
# Dependencies: Working DNS resolution (any resolver) for NTS-KE hostnames;
#               a roughly correct clock at boot (see driftfile below and the
#               -s flag in the chronyd sysconfig file).
# Standard: RFC 8915 (NTS), RFC 5905 (NTPv4), RFC 8633 (NTP BCP).
#
# Time sources are strictly NTS-only and non-smearing, selected for operator,
# network-path, and stratum diversity via independent institutional, community,
# and anycast anchors.

# Cloudflare ; anycast (global POPs) ; stratum 3
server time.cloudflare.com iburst nts
# Netnod ; anycast, but all nodes are sited in Sweden ; stratum 1
server nts.netnod.se iburst nts
# SIDN/TimeNL ; unicast (NL) ; stratum 1
server ntppool1.time.nl iburst nts
# PTB (national metrology institute) ; unicast (DE) ; stratum 1
# Both hosts are one operator at one site: they are not independent votes.
server ptbtime1.ptb.de iburst nts
server ptbtime2.ptb.de iburst nts

# Unauthenticated sources must never be selected. Note that Fedora's default
# `sourcedir /run/chrony-dhcp` is deliberately omitted from this file, so
# DHCP-supplied servers are never even loaded, let alone selected.
authselectmode require

# Require a minimum of 2 agreeing sources before disciplining the clock.
minsources 2

# Skip certificate validity-time (activation/expiration) checks for NTS-KE
# until the clock has been corrected once. Protects the first key exchange
# from failing due to an incorrect RTC; applies only to chronyd's own TLS.
nocerttimecheck 1

# Authoritative leap-second table (IERS schedule, shipped by tzdata). With the
# default `leapsecmode system`, a leap second is applied as a true kernel
# step — never slewed or smeared.
leapseclist /usr/share/zoneinfo/leap-seconds.list

# Persist NTS cookies/keys across restarts (skips NTS-KE round trips; note
# that cookies cannot substitute for DNS resolution of source hostnames).
ntsdumpdir /var/lib/chrony

# Step the clock if the offset exceeds 1 second during the first 3 updates.
makestep 1.0 3

# Frequency-error (drift) history. Its modification time doubles as the
# cold-boot clock floor applied by `chronyd -s`.
driftfile /var/lib/chrony/drift

# Periodically copy synchronized system time back to the RTC (kernel
# 11-minute mode).
rtcsync

# Directory for daemon logs.
logdir /var/log/chrony
